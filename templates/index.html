<!DOCTYPE html>
<html>

<head>
    <title>StegFind</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/main.css">
    <link rel="stylesheet" href="{{url_for('static',filename='dist/css/output.css')}}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="../static/dist/js/main.js"></script>
</head>

<body class="flex flex-col justify-between h-screen items-center"></body>
<header class="flex items-center gap-5 text-2xl rounded-sm">
    <h1> StegFind </h1>
    <h1> Save Data </h1>
    <h1> History </h1>
    <h1> Usage </h1>
    <h1> Dark Mode </h1>
</header>

<main class="flex w-full h-[75%] border-2">
    <div id="drop-area" class="border-2 w-full flex items-center justify-center text-9xl">
        Drop me !!
    </div>
    <output hidden id="output-area" class="border-2 w-full h-full text-[2rem] leading-none">
        <div class="tab text-6xl">
            <button class="tablinks"
                onclick="openTab(event, 'Output');">Output</button>
            <button class="tablinks"
                onclick="openTab(event, 'String');">String</button>
            <button class="tablinks"
                onclick="openTab(event, 'Content');">HexDump</button>
            <button class="tablinks"    
                onclick="openTab(event, 'EXIF');">EXIF</button>
            <button class="tablinks"    
                onclick="openTab(event, 'LSB');">LSB</button>
            <button class="tablinks"    
                onclick="openTab(event, 'Spectrogram');">Spectrogram</button>
        </div>

        <div hidden id="Output" class="tabcontent">
            <p id="Output-output"> </p>
        </div>

        <div hidden id="String" class="tabcontent h-full">
            <p class="overflow-auto overflow-x-hidden h-full" id="String-output"></p>
        </div>

        <div hidden id="Content" class="tabcontent h-full">
            <p class="overflow-auto overflow-x-hidden h-full" id="Content-output"> </p>
        </div>

        <div hidden id="EXIF" class="tabcontent h-full">
            <p class="overflow-auto overflow-x-hidden h-full" id="EXIF-output"></p>
        </div>

        <div hidden id="LSB" class="tabcontent h-full">
            <p class="overflow-auto overflow-x-hidden h-full" id="LSB-output"></p>
        </div>

        <div hidden id="Spectrogram" class="tabcontent h-full">
            <img class="overflow-auto overflow-x-hidden h-full" id="img-upload" alt="img_data"/>
        </div>

    </output>
</main>
<div class="w-screen flex flex-col">
    <progress id="file" max="100" value="70" class="w-full"> 70% </progress>
    <button class="border-2 mt-2" id="analyze-button">Analyze</button>
</div>

<footer>
    <p>&copy; 2024 StegFind. All rights reserved.</p>
</footer>
</body>

</html>
